<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Global de Pedidos - MACUIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-orange: #ff7324;
            --secondary-orange: #ffeadf;
            --bg-light: #f8f9fa;
            --text-dark: #1e1e1e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            padding: 30px;
        }

        .main-wrapper {
            max-width: 1300px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 25px;
        }

        .content-container {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 1.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo h1 i { color: var(--primary-orange); }

        .btn-regresar {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 700;
            font-size: 0.85rem;
            border-bottom: 2px solid var(--primary-orange);
        }

        .title-section h2 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        th {
            text-align: left;
            padding: 10px 20px;
            font-size: 0.75rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            background-color: #fdfdfd;
            padding: 18px 20px;
            font-size: 0.9rem;
            border-top: 1px solid #f1f1f1;
            border-bottom: 1px solid #f1f1f1;
            transition: 0.2s;
        }

        tr td:first-child { border-left: 1px solid #f1f1f1; border-radius: 12px 0 0 12px; font-weight: 700; color: #888; }
        tr td:last-child { border-right: 1px solid #f1f1f1; border-radius: 0 12px 12px 0; }

        /* Conexión visual: cursor pointer para indicar que es clickeable */
        tr:hover td {
            background-color: var(--secondary-orange);
            border-color: var(--primary-orange);
            cursor: pointer;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .bg-process { background: #e3f2fd; color: #0d47a1; }
        .bg-shipped { background: #fff3e0; color: #e65100; }
        .bg-done { background: #e8f5e9; color: #1b5e20; }

        .filter-card {
            background: var(--text-dark);
            color: white;
            padding: 35px;
            border-radius: 30px;
            height: fit-content;
            position: sticky;
            top: 30px;
        }

        .filter-card h3 {
            font-size: 1rem;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-left: 4px solid var(--primary-orange);
            padding-left: 15px;
        }

        .filter-group {
            margin-bottom: 20px;
        }

        .filter-group label {
            display: block;
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .filter-group select, .filter-group input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 10px;
            color: white;
            outline: none;
            font-size: 0.85rem;
        }

        .filter-group input:focus {
            border-color: var(--primary-orange);
        }

        .btn-filter {
            width: 100%;
            padding: 14px;
            background: var(--primary-orange);
            border: none;
            color: white;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-filter:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 115, 36, 0.4);
        }

        @media (max-width: 1000px) {
            .main-wrapper { grid-template-columns: 1fr; }
            .filter-card { order: -1; position: relative; top: 0; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="content-container">
            <header class="header">
                <div class="logo">
                    <h1>MACUIN <i class="bi bi-car-front-fill"></i></h1>
                </div>
                <a href="dashboard.html" class="btn-regresar">REGRESAR</a>
            </header>

            <div class="title-section">
                <h2>Lista Global de Pedidos</h2>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>ID Pedido</th>
                            <th>Cliente</th>
                            <th>Fecha</th>
                            <th>Total</th>
                            <th>Estatus</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr onclick="location.href='detalle_pedido.html'">
                            <td>#P-1024</td>
                            <td style="font-weight: 600;">Refaccionaria Sánchez</td>
                            <td>24 Feb, 2026</td>
                            <td style="font-weight: 700; color: var(--primary-orange);">$4,250.00</td>
                            <td><span class="badge bg-process">En Proceso</span></td>
                        </tr>
                        <tr onclick="location.href='detalle_pedido.html'">
                            <td>#P-1023</td>
                            <td style="font-weight: 600;">Taller Mecánico "El Rayo"</td>
                            <td>22 Feb, 2026</td>
                            <td style="font-weight: 700; color: var(--primary-orange);">$1,890.00</td>
                            <td><span class="badge bg-shipped">Enviado</span></td>
                        </tr>
                        <tr onclick="location.href='detalle_pedido.html'">
                            <td>#P-1022</td>
                            <td style="font-weight: 600;">Autopartes Express</td>
                            <td>20 Feb, 2026</td>
                            <td style="font-weight: 700; color: var(--primary-orange);">$12,400.00</td>
                            <td><span class="badge bg-done">Entregado</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <aside class="filter-card">
            <h3>Filtros</h3>
            <form action="pedidos.html" method="GET">
                <div class="filter-group">
                    <label>BUSCAR POR CLIENTE</label>
                    <input type="text" placeholder="Nombre o ID...">
                </div>
                <div class="filter-group">
                    <label>ESTATUS DEL PEDIDO</label>
                    <select>
                        <option>Todos los pedidos</option>
                        <option>En proceso</option>
                        <option>Enviado</option>
                        <option>Entregado</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>FECHA</label>
                    <input type="date">
                </div>
                <button type="submit" class="btn-filter">Aplicar Filtros</button>
            </form>
        </aside>
    </div>

</body>
</html>
