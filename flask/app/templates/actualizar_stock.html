<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Stock - MACUIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-orange: #ff7324; --primary-dark: #1e1e1e; --bg-light: #f8f9fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--bg-light); padding: 20px; }
        .stock-card { background: #ffffff; width: 100%; max-width: 550px; padding: 45px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.06); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }
        .logo h1 { font-size: 1.4rem; display: flex; align-items: center; gap: 10px; font-weight: 800; }
        .logo h1 i { color: var(--primary-orange); }
        .btn-regresar { text-decoration: none; color: var(--primary-dark); font-weight: 600; font-size: 0.85rem; border-bottom: 2px solid var(--primary-orange); }
        h2 { font-size: 2rem; margin-bottom: 30px; font-weight: 800; text-align: center; color: var(--primary-dark); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 8px; color: #666; text-transform: uppercase; }
        .form-group input, .form-group select { width: 100%; padding: 14px 18px; border-radius: 12px; border: 1px solid #eef0f2; background-color: #f9f9f9; outline: none; font-size: 0.95rem; transition: 0.3s; }
        .form-group input:focus { border-color: var(--primary-orange); background-color: #fff; box-shadow: 0 0 0 4px rgba(255, 115, 36, 0.08); }
        .readonly-field { background-color: #f1f1f1 !important; color: #888; font-weight: 600; cursor: not-allowed; }
        .btn-actualizar { width: 100%; padding: 16px; margin-top: 20px; border-radius: 15px; border: none; background-color: var(--primary-dark); color: white; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-actualizar:hover { background-color: var(--primary-orange); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255, 115, 36, 0.3); }
    </style>
</head>
<body>
    <div class="stock-card">
        <header class="header">
            <div class="logo"><h1>MACUIN <i class="bi bi-car-front-fill"></i></h1></div>
            <a href="{{ url_for('main.gestion_inventario') }}" class="btn-regresar">REGRESAR</a>
        </header>
        <h2>Actualizar stock</h2>
        
        <form action="{{ url_for('main.gestion_inventario') }}" method="GET">
            <div class="form-group"><label>Código de artículo</label><input type="text" value="ART-12345" class="readonly-field" readonly></div>
            <div class="form-group"><label>Nombre del artículo</label><input type="text" value="Bomba de Agua G-Pro" class="readonly-field" readonly></div>
            <div class="form-group"><label>Cantidad actual</label><input type="number" value="15" class="readonly-field" readonly></div>
            <div class="form-group"><label style="color: var(--primary-orange);">Nueva cantidad</label><input type="number" placeholder="Ingresa el nuevo total" required></div>
            <div class="form-group"><label>Motivo</label>
                <select required>
                    <option value="" disabled selected>Selecciona una opción</option>
                    <option>Entrada por compra</option>
                    <option>Salida por venta</option>
                    <option>Ajuste (Daño/Pérdida)</option>
                </select>
            </div>
            <button type="submit" class="btn-actualizar">Confirmar actualización</button>
        </form>
    </div>
</body>
</html>
