<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Autoparte - MACUIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-orange: #ff7324; --primary-dark: #1e1e1e; --bg-light: #f8f9fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--bg-light); padding: 20px; }
        .main-container { background: #ffffff; width: 100%; max-width: 950px; display: grid; grid-template-columns: 1fr 1fr; border-radius: 25px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        .form-side { padding: 40px 50px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo h1 { font-size: 1.4rem; display: flex; align-items: center; gap: 8px; font-weight: 700; }
        .logo h1 i { color: var(--primary-orange); }
        .btn-regresar { text-decoration: none; color: var(--primary-dark); font-weight: 600; font-size: 0.8rem; border-bottom: 2px solid var(--primary-orange); }
        h2 { font-size: 1.8rem; margin-bottom: 25px; font-weight: 700; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 6px; color: #444; text-transform: uppercase; }
        .input-id { background-color: #eee !important; color: #888; font-weight: 700; border: 1px dashed #ccc !important; }
        .input-group input, .input-group select { width: 100%; padding: 11px 15px; border-radius: 10px; border: 1px solid #e9ecef; background-color: #fcfcfc; outline: none; font-size: 0.9rem; transition: 0.3s; }
        .input-group input:focus { border-color: var(--primary-orange); box-shadow: 0 0 0 4px rgba(255, 115, 36, 0.1); }
        .btn-actualizar { width: 100%; padding: 14px; margin-top: 15px; border-radius: 10px; border: none; background-color: var(--primary-dark); color: white; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-actualizar:hover { background-color: var(--primary-orange); transform: translateY(-2px); }
        .image-side { background-color: var(--primary-dark); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 50px; color: white; text-align: center; }
        .current-image-preview { width: 100%; max-width: 300px; aspect-ratio: 1/1; background: #2a2a2a; border-radius: 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        .btn-subir-nueva { background: rgba(255,255,255,0.1); color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; transition: 0.3s; }
        .btn-subir-nueva:hover { background: var(--primary-orange); border-color: var(--primary-orange); }
        @media (max-width: 768px) { .main-container { grid-template-columns: 1fr; } .image-side { padding: 30px; } }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="form-side">
            <div class="header">
                <div class="logo"><h1>MACUIN <i class="bi bi-car-front-fill"></i></h1></div>
                <a href="productos.html" class="btn-regresar">REGRESAR</a>
            </div>
            <h2>Editar autoparte</h2>
            <form action="productos.html">
                <div class="input-group"><label>Código de artículo</label><input type="text" value="ART-9920" class="input-id" readonly></div>
                <div class="input-group"><label>Nombre del artículo</label><input type="text" placeholder="Filtro de Aire Premium"></div>
                <div class="input-group"><label>Cantidad en stock</label><input type="number" value="45"></div>
                <div class="input-group"><label>Precio unitario</label><input type="text" value="$350.00"></div>
                <div class="input-group"><label>Estado actual</label>
                    <select><option selected>Disponible</option><option>Stock bajo</option><option>Agotado</option></select>
                </div>
                <button type="submit" class="btn-actualizar">Actualizar Datos</button>
            </form>
        </div>
        <div class="image-side">
            <p style="margin-bottom: 20px; font-size: 0.9rem; color: #888;">Imagen actual del producto</p>
            <div class="current-image-preview"><i class="bi bi-image" style="font-size: 4rem; color: #444;"></i></div>
            <button class="btn-subir-nueva"><i class="bi bi-camera"></i> Cambiar imagen</button>
        </div>
    </div>
</body>
</html>
