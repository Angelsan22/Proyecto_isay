<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - MACUIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-orange: #ff7324; --primary-dark: #1e1e1e; --bg-light: #f8f9fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--bg-light); background-image: radial-gradient(#dee2e6 0.5px, transparent 0.5px); background-size: 20px 20px; }
        .recovery-card { background: #ffffff; width: 100%; max-width: 550px; padding: 40px 50px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .logo { text-align: left; }
        .logo h1 { font-size: 1.4rem; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; color: var(--primary-dark); font-weight: 700; }
        .logo p { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .nav-link { text-decoration: none; color: var(--primary-dark); font-weight: 600; font-size: 0.8rem; border-bottom: 2px solid var(--primary-orange); }
        h2 { font-size: 1.8rem; margin-bottom: 30px; color: var(--primary-dark); font-weight: 700; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .input-group { position: relative; text-align: left; }
        .input-group label { display: block; font-size: 0.8rem; color: #666; margin-bottom: 8px; margin-left: 5px; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #adb5bd; }
        .input-wrapper input { width: 100%; padding: 12px 40px 12px 15px; border-radius: 10px; border: 1px solid #e9ecef; background-color: #fcfcfc; outline: none; font-size: 0.9rem; transition: all 0.3s; }
        .input-wrapper input:focus { border-color: var(--primary-orange); box-shadow: 0 0 0 3px rgba(255, 115, 36, 0.1); }
        .btn-recovery { width: 100%; max-width: 300px; margin-top: 10px; padding: 14px; border-radius: 30px; border: none; background: linear-gradient(135deg, #ff8c4a, var(--primary-orange)); color: white; font-weight: 600; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 115, 36, 0.3); transition: all 0.3s; }
        .btn-recovery:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 115, 36, 0.4); }
        .back-link { display: block; margin-top: 25px; font-size: 0.85rem; color: #6c757d; text-decoration: none; }
        .back-link:hover { color: var(--primary-dark); text-decoration: underline; }
        @media (max-width: 500px) { .grid-inputs { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="recovery-card">
        <div class="header">
            <div class="logo">
                <h1>MACUIN <i class="bi bi-car-front-fill"></i></h1>
                <p>Personal Interno</p>
            </div>
            <a href="{{ url_for('main.index') }}" class="nav-link">INICIAR SESIÓN</a>
        </div>
        <h2>Recuperar Contraseña</h2>
        
        <form action="{{ url_for('main.index') }}" method="GET">
            <div class="grid-inputs">
                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="email" placeholder="Correo" required>
                        <i class="bi bi-envelope"></i>
                    </div>
                </div>
                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="text" placeholder="Perfil" required>
                        <i class="bi bi-person-badge"></i>
                    </div>
                </div>
            </div>
            <div class="input-group" style="margin-bottom: 20px;">
                <label>Código de verificación</label>
                <div class="grid-inputs">
                    <div class="input-wrapper">
                        <input type="password" placeholder="Contraseña nueva" required>
                        <i class="bi bi-lock"></i>
                    </div>
                    <div class="input-wrapper">
                        <input type="password" placeholder="Confirmar contraseña" required>
                        <i class="bi bi-lock-check"></i>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn-recovery">Cambiar contraseña</button>
        </form>
        
        <a href="{{ url_for('main.index') }}" class="back-link">o Regresar a inicio</a>
    </div>
</body>
</html>
