<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - MACUIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--bg-main); color: var(--text-main); position: relative; overflow: hidden; }
        
        /* Subtle background pattern */
        body::before { content: ''; position: absolute; width: 100%; height: 100%; background-image: radial-gradient(var(--border-color) 0.5px, transparent 0.5px); background-size: 20px 20px; opacity: 0.3; z-index: -1; }

        .recovery-card { background: var(--bg-card); width: 100%; max-width: 550px; padding: 40px 50px; border-radius: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 1px solid var(--border-color); text-align: center; z-index: 1; }
        
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
        .logo { text-align: left; }
        .logo h1 { font-size: 1.5rem; letter-spacing: -1px; display: flex; align-items: center; gap: 8px; color: var(--text-main); font-weight: 800; }
        .logo h1 i { color: var(--primary-orange); }
        .logo p { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 1.5px; margin-top: 5px; }
        
        .header-actions { display: flex; align-items: center; gap: 15px; }
        .nav-link { text-decoration: none; color: var(--text-main); font-weight: 700; font-size: 0.8rem; border-bottom: 2px solid var(--primary-orange); transition: 0.3s; }
        .nav-link:hover { opacity: 0.7; }

        /* Compact Theme Toggle */
        .theme-toggle { background: var(--bg-main); border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 12px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 0.75rem; transition: 0.3s; }
        .theme-toggle:hover { border-color: var(--primary-orange); color: var(--primary-orange); }

        h2 { font-size: 2.2rem; margin-bottom: 35px; color: var(--text-main); font-weight: 800; letter-spacing: -1.5px; }
        
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .input-group { position: relative; text-align: left; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; margin-left: 5px; text-transform: uppercase; }
        
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); transition: 0.3s; }
        .input-wrapper input { width: 100%; padding: 14px 45px 14px 18px; border-radius: 14px; border: 1px solid var(--border-color); background-color: var(--bg-main); color: var(--text-main); outline: none; font-size: 0.95rem; transition: 0.3s; }
        .input-wrapper input:focus { border-color: var(--primary-orange); background-color: var(--bg-card); box-shadow: 0 0 0 4px rgba(255, 115, 36, 0.1); }
        .input-wrapper input:focus + i { color: var(--primary-orange); transform: translateY(-50%) scale(1.1); }
        
        .btn-recovery { width: 100%; max-width: 300px; margin-top: 10px; padding: 16px; border-radius: 30px; border: none; background: var(--primary-orange); color: white; font-weight: 800; font-size: 1rem; cursor: pointer; box-shadow: 0 10px 20px rgba(255, 115, 36, 0.2); transition: 0.3s; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-recovery:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(255, 115, 36, 0.3); }
        
        .back-link { display: block; margin-top: 30px; font-size: 0.85rem; color: var(--text-muted); text-decoration: none; font-weight: 600; transition: 0.3s; }
        .back-link:hover { color: var(--primary-orange); }
        @media (max-width: 500px) { .grid-inputs { grid-template-columns: 1fr; } .recovery-card { padding: 40px 25px; } }
    </style>
</head>
<body>
    <div class="recovery-card">
        <div class="header">
            <div class="logo">
                <h1>MACUIN <i class="bi bi-car-front-fill"></i></h1>
                <p>Personal Interno</p>
            </div>
            <a href="{{ url_for('main.index') }}" class="nav-link">INICIAR SESIÓN</a>
        </div>
        <h2>Recuperar Contraseña</h2>
        
        <form action="{{ url_for('main.index') }}" method="GET">
            <div class="grid-inputs">
                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="email" placeholder="Correo" required>
                        <i class="bi bi-envelope"></i>
                    </div>
                </div>
                <div class="input-group">
                    <div class="input-wrapper">
                        <input type="text" placeholder="Perfil" required>
                        <i class="bi bi-person-badge"></i>
                    </div>
                </div>
            </div>
            <div class="input-group" style="margin-bottom: 20px;">
                <label>Código de verificación</label>
                <div class="grid-inputs">
                    <div class="input-wrapper">
                        <input type="password" placeholder="Contraseña nueva" required>
                        <i class="bi bi-lock"></i>
                    </div>
                    <div class="input-wrapper">
                        <input type="password" placeholder="Confirmar contraseña" required>
                        <i class="bi bi-lock-check"></i>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn-recovery">Cambiar contraseña</button>
        </form>
        
        <a href="{{ url_for('main.index') }}" class="back-link">o Regresar a inicio</a>
    </div>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
</html>
