<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Autoparte - MACUIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--bg-main); color: var(--text-main); padding: 20px; }
        
        .main-container { background: var(--bg-card); width: 100%; max-width: 950px; display: grid; grid-template-columns: 1.2fr 0.8fr; border-radius: 32px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.1); border: 1px solid var(--border-color); }
        .form-side { padding: 40px 50px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo h1 { font-size: 1.4rem; display: flex; align-items: center; gap: 8px; font-weight: 800; color: var(--text-main); }
        .logo h1 i { color: var(--primary-orange); }
        
        .header-actions { display: flex; align-items: center; gap: 15px; }
        .btn-regresar { text-decoration: none; color: var(--text-main); font-weight: 700; font-size: 0.8rem; border-bottom: 2px solid var(--primary-orange); transition: 0.3s; }
        .btn-regresar:hover { opacity: 0.7; }

        
        .theme-toggle { background: var(--bg-main); border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 12px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 0.75rem; transition: 0.3s; }
        .theme-toggle:hover { border-color: var(--primary-orange); }

        h2 { font-size: 2rem; margin-bottom: 25px; font-weight: 800; letter-spacing: -1px; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .input-control { width: 100%; padding: 14px 18px; border-radius: 14px; border: 1px solid var(--border-color); background-color: var(--bg-main); color: var(--text-main); outline: none; font-size: 0.95rem; transition: 0.3s; }
        .input-control:focus { border-color: var(--primary-orange); background-color: var(--bg-card); box-shadow: 0 0 0 4px rgba(255, 115, 36, 0.1); }
        
        .input-id { background-color: var(--bg-main) !important; color: var(--text-muted); font-weight: 700; border: 1px dashed var(--border-color) !important; opacity: 0.6; }
        
        .btn-actualizar { width: 100%; padding: 18px; margin-top: 15px; border-radius: 16px; border: none; background-color: var(--dark-grey); color: white; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; border: 1px solid #333; }
        .btn-actualizar:hover { background-color: var(--primary-orange); border-color: var(--primary-orange); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255, 115, 36, 0.2); }
        
        .image-side { background-color: var(--dark-grey); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 50px; color: white; text-align: center; position: relative; }
        .current-image-preview { width: 100%; max-width: 300px; aspect-ratio: 1/1; background: rgba(255,255,255,0.03); border-radius: 24px; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        .btn-subir-nueva { background: rgba(255,255,255,0.1); color: white; padding: 12px 25px; border-radius: 25px; font-size: 0.85rem; font-weight: 700; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; transition: 0.3s; }
        .btn-subir-nueva:hover { background: var(--primary-orange); border-color: var(--primary-orange); transform: scale(1.05); }

        @media (max-width: 850px) { .main-container { grid-template-columns: 1fr; } .image-side { order: -1; padding: 40px; } }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="form-side">
            <div class="header">
                <div class="logo"><h1>MACUIN <i class="bi bi-car-front-fill"></i></h1></div>
                <a href="{{ url_for('main.productos') }}" class="btn-regresar">REGRESAR</a>
            </div>
            <h2>Editar autoparte</h2>
            <form action="{{ url_for('main.productos') }}" method="GET">
                <div class="input-group">
                    <label>Código de artículo</label>
                    <input type="text" value="ART-9920" class="input-control input-id" readonly>
                </div>
                <div class="input-group">
                    <label>Nombre del artículo</label>
                    <input type="text" placeholder="Filtro de Aire Premium" class="input-control" required>
                </div>
                <div class="input-group">
                    <label>Cantidad en stock</label>
                    <input type="number" value="45" class="input-control" required>
                </div>
                <div class="input-group">
                    <label>Precio unitario</label>
                    <input type="text" value="$350.00" class="input-control" required>
                </div>
                <div class="input-group">
                    <label>Estado actual</label>
                    <select class="input-control">
                        <option selected>Disponible</option>
                        <option>Stock bajo</option>
                        <option>Agotado</option>
                    </select>
                </div>
                <button type="submit" class="btn-actualizar">Actualizar Datos</button>
            </form>
        </div>
        <div class="image-side">
            <p style="margin-bottom: 20px; font-size: 0.9rem; color: rgba(255,255,255,0.5);">Imagen actual del producto</p>
            <div class="current-image-preview">
                <i class="bi bi-image" style="font-size: 4.5rem; color: rgba(255,255,255,0.1);"></i>
            </div>
            <button class="btn-subir-nueva"><i class="bi bi-camera"></i> Cambiar imagen</button>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
</html>
