<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Autoparte - MACUIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-orange: #ff7324; --primary-dark: #1e1e1e; --bg-light: #f8f9fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--bg-light); padding: 20px; }
        .main-container { background: #ffffff; width: 100%; max-width: 900px; display: grid; grid-template-columns: 1fr 1fr; border-radius: 25px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        .form-side { padding: 50px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .logo h1 { font-size: 1.4rem; display: flex; align-items: center; gap: 8px; font-weight: 700; }
        .logo h1 i { color: var(--primary-orange); }
        .btn-regresar { text-decoration: none; color: var(--primary-dark); font-weight: 600; font-size: 0.8rem; border-bottom: 2px solid var(--primary-orange); }
        h2 { font-size: 1.8rem; margin-bottom: 30px; font-weight: 700; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: #555; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid #e9ecef; background-color: #fcfcfc; outline: none; font-size: 0.9rem; transition: 0.3s; }
        .input-group input:focus, .input-group select:focus { border-color: var(--primary-orange); box-shadow: 0 0 0 4px rgba(255, 115, 36, 0.1); }
        .btn-registrar { width: 100%; padding: 15px; margin-top: 10px; border-radius: 12px; border: none; background-color: var(--primary-dark); color: white; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-registrar:hover { background-color: #000; transform: translateY(-2px); }
        .image-side { background-color: var(--primary-dark); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 50px; color: white; }
        .upload-area { width: 100%; aspect-ratio: 1/1; background-color: rgba(255,255,255,0.05); border: 2px dashed rgba(255,255,255,0.2); border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; overflow: hidden; position: relative; }
        .upload-area:hover { border-color: var(--primary-orange); background-color: rgba(255,255,255,0.1); }
        .upload-area i { font-size: 3rem; color: var(--primary-orange); margin-bottom: 15px; }
        .btn-subir { margin-top: 25px; background: white; color: var(--primary-dark); padding: 12px 30px; border-radius: 25px; font-weight: 700; font-size: 0.9rem; border: none; cursor: pointer; }
        @media (max-width: 768px) { .main-container { grid-template-columns: 1fr; } .image-side { order: -1; padding: 30px; } }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="form-side">
            <div class="header">
                <div class="logo"><h1>MACUIN <i class="bi bi-car-front-fill"></i></h1></div>
                <a href="productos.html" class="btn-regresar">REGRESAR</a>
            </div>
            <h2>Registrar autoparte</h2>
            <form action="productos.html">
                <div class="input-group"><label>Nombre</label><input type="text" placeholder="Ej. Filtro de Aceite"></div>
                <div class="input-group"><label>Cantidad</label><input type="number" placeholder="0"></div>
                <div class="input-group"><label>Precio unitario</label><input type="text" placeholder="$0.00"></div>
                <div class="input-group"><label>Estado</label>
                    <select><option>Disponible</option><option>Stock bajo</option><option>Agotado</option></select>
                </div>
                <div class="input-group"><label>Descripción</label><textarea rows="2" placeholder="Detalles técnicos..."></textarea></div>
                <button type="submit" class="btn-registrar">Registrar</button>
            </form>
        </div>
        <div class="image-side">
            <div class="upload-area"><i class="bi bi-cloud-arrow-up"></i><p style="font-size: 0.9rem; color: #aaa;">Arrastra tu imagen aquí</p></div>
            <button class="btn-subir">Subir imagen</button>
        </div>
    </div>
</body>
</html>
