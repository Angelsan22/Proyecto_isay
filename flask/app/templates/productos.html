<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - MACUIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-orange: #ff7324; --secondary-orange: #ffeadf; --bg-light: #f8f9fa; --text-dark: #1e1e1e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); padding: 40px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .view-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 2px solid var(--bg-light); padding-bottom: 20px; }
        .logo h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 10px; font-weight: 700; }
        .logo h1 i { color: var(--primary-orange); }
        .btn-back { text-decoration: none; color: var(--text-dark); font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-back:hover { color: var(--primary-orange); }
        .section-title { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .section-title h2 { font-size: 2rem; font-weight: 700; color: var(--text-dark); }
        .orange-line { width: 60px; height: 5px; background: var(--primary-orange); margin-top: 8px; border-radius: 10px; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        th { text-align: left; padding: 15px 20px; color: #888; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        td { background-color: #fcfcfc; padding: 20px; font-size: 0.95rem; border: 1px solid #f1f1f1; transition: 0.3s; }
        tr td:first-child { border-radius: 15px 0 0 15px; border-right: none; }
        tr td:last-child { border-radius: 0 15px 15px 0; border-left: none; text-align: center; }
        tr:hover td { background-color: var(--secondary-orange); border-color: var(--primary-orange); cursor: pointer; }
        .status { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .status.ok { background: #d4edda; color: #155724; }
        .status.low { background: #fff3cd; color: #856404; }
        .product-img-box { width: 50px; height: 50px; background: #eee; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; color: #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <header class="view-header">
            <div class="logo">
                <h1>MACUIN <i class="bi bi-car-front-fill"></i></h1>
                <p style="font-size: 0.7rem; color: #888; text-transform: uppercase;">Personal Interno</p>
            </div>
            <a href="dashboard.html" class="btn-back"><i class="bi bi-arrow-left"></i> REGRESAR</a>
        </header>
        <div class="section-title">
            <div>
                <h2>PRODUCTOS</h2>
                <div class="orange-line"></div>
            </div>
            <a href="registrar_autoparte.html" class="btn-back" style="color: var(--primary-orange);">+ AGREGAR NUEVO</a>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Nombre</th><th>Cantidad</th><th>Estado</th><th>Precio Unitario</th><th>Imagen</th></tr>
                </thead>
                <tbody>
                    <tr onclick="location.href='editar_autoparte.html'">
                        <td style="font-weight: 600;">Filtro de Aire Premium</td>
                        <td>45 unidades</td>
                        <td><span class="status ok">En Stock</span></td>
                        <td style="font-weight: 700; color: var(--primary-orange);">$350.00</td>
                        <td><div class="product-img-box"><i class="bi bi-image"></i></div></td>
                    </tr>
                    <tr onclick="location.href='editar_autoparte.html'">
                        <td style="font-weight: 600;">Bujía de Iridio</td>
                        <td>12 unidades</td>
                        <td><span class="status low">Stock Bajo</span></td>
                        <td style="font-weight: 700; color: var(--primary-orange);">$120.00</td>
                        <td><div class="product-img-box"><i class="bi bi-image"></i></div></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
