<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MACUIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-orange: #ff7324; --primary-dark: #1e1e1e; --bg-light: #f8f9fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--bg-light); background-image: radial-gradient(#dee2e6 0.5px, transparent 0.5px); background-size: 20px 20px; }
        .login-card { background: #ffffff; width: 100%; max-width: 450px; padding: 50px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: transform 0.3s ease; }
        .login-card:hover { transform: translateY(-5px); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; }
        .logo h1 { font-size: 1.5rem; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; color: var(--primary-dark); font-weight: 700; }
        .logo p { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .nav-link { text-decoration: none; color: var(--primary-dark); font-weight: 600; font-size: 0.8rem; padding: 5px 0; border-bottom: 2px solid var(--primary-orange); }
        .form-section h2 { font-size: 1.8rem; margin-bottom: 30px; color: var(--primary-dark); font-weight: 600; }
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #adb5bd; transition: color 0.3s; }
        .input-group input { width: 100%; padding: 14px 14px 14px 50px; border-radius: 12px; border: 1px solid #e9ecef; background-color: #fcfcfc; outline: none; font-size: 0.95rem; transition: all 0.3s; }
        .input-group input:focus { border-color: var(--primary-orange); background-color: #fff; box-shadow: 0 0 0 4px rgba(255, 115, 36, 0.1); }
        .input-group input:focus + i { color: var(--primary-orange); }
        .options { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: #6c757d; margin-bottom: 30px; }
        .options label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .options a { text-decoration: none; color: var(--primary-orange); font-weight: 500; }
        .btn-login { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(135deg, #ff8c4a, var(--primary-orange)); color: white; font-weight: 600; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 115, 36, 0.3); transition: all 0.3s; }
        .btn-login:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(255, 115, 36, 0.4); }
        .register-footer { margin-top: 25px; font-size: 0.9rem; text-align: center; color: #6c757d; }
        .register-footer a { color: var(--primary-dark); text-decoration: none; font-weight: 700; }
        .register-footer a:hover { color: var(--primary-orange); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="header">
            <div class="logo">
                <h1>MACUIN <i class="bi bi-car-front-fill"></i></h1>
                <p>Personal Interno</p>
            </div>
        </div>
        <div class="form-section">
            <h2>Iniciar Sesión</h2>
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div style="padding: 10px; border-radius: 5px; margin-bottom: 20px; background-color: #f82a2a; color: white;">
                    {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}
            <form method="POST" action="{{ url_for('main.index') }}">
                <div class="input-group">
                    <i class="bi bi-person"></i>
                    <input type="email" name="email" placeholder="Correo de Administrador" required>
                </div>
                <div class="input-group">
                    <i class="bi bi-lock"></i>
                    <input type="password" name="password" placeholder="Contraseña" required>
                </div>
                <div class="options">
                    <label><input type="checkbox"> Recordarme</label>
                    <a href="{{ url_for('main.recuperar') }}">¿Olvidaste tu clave?</a>
                </div>
                <button type="submit" class="btn-login">Ingresar al Sistema</button>
            </form>
        </div>
    </div>
</body>
</html>
