<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - MACUIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-orange: #ff7324; --dark: #1e1e1e; --bg: #f8f9fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); }
        
        /* Navbar */
        nav { background: var(--dark); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .nav-logo { font-weight: 800; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        .nav-link { color: white; text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .nav-link:hover { color: var(--primary-orange); }

        /* Card */
        .profile-card { max-width: 500px; margin: 60px auto; background: white; padding: 50px 40px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.06); text-align: center; }
        .profile-icon { font-size: 6rem; color: var(--dark); margin-bottom: 15px; }
        .user-name { font-size: 1.8rem; font-weight: 800; color: var(--dark); margin-bottom: 5px; }
        .user-title { color: #888; font-weight: 500; margin-bottom: 30px; }
        
        /* Details */
        .details-box { text-align: left; background: #fdfdfd; padding: 25px; border-radius: 20px; border: 1px solid #f1f1f1; margin: 25px 0; }
        .details-box p { margin-bottom: 12px; font-size: 0.95rem; color: #444; }
        .details-box p:last-child { margin-bottom: 0; }
        .details-box strong { color: var(--dark); margin-right: 5px; }

        /* Logout Button */
        .btn-logout { display: block; width: 100%; padding: 16px; background: #ff4d4d; color: white; border-radius: 15px; text-decoration: none; font-weight: 700; transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 77, 77, 0.2); }
        .btn-logout:hover { background: #e60000; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255, 77, 77, 0.3); }
    </style>
</head>
<body>
    <nav>
        <div class="nav-logo">
            MACUIN <i class="bi bi-car-front-fill" style="color: var(--primary-orange);"></i>
        </div>
        <div>
            <a href="{{ url_for('main.dashboard') }}" class="nav-link">
                <i class="bi bi-arrow-left"></i> Volver al Inicio
            </a>
        </div>
    </nav>

    <div class="profile-card">
        <div class="profile-icon"><i class="bi bi-person-circle"></i></div>
        <h2 class="user-name">Daniel</h2>
        <p class="user-title">Administrador de Inventario</p>
        
        <div class="details-box">
            <p><strong>Email:</strong> daniel@macuin.com</p>
            <p><strong>Rol:</strong> Personal Interno</p>
            <p><strong>Proyecto:</strong> MACUIN Autopartes</p>
        </div>

        <a href="{{ url_for('main.index') }}" class="btn-logout">
            <i class="bi bi-box-arrow-left"></i> Cerrar Sesión
        </a>
    </div>
</body>
</html>
