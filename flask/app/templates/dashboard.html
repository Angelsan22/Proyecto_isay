<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MACUIN - Naranja</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary-orange: #ff7324; --secondary-orange: #ffeadf; --dark-grey: #1e1e1e; --light-grey: #f8f9fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { display: flex; min-height: 100vh; background-color: var(--light-grey); }
        .sidebar { width: 260px; background-color: var(--dark-grey); color: white; display: flex; flex-direction: column; padding: 30px 20px; position: fixed; height: 100vh; }
        .sidebar-logo h1 { font-size: 1.4rem; color: white; display: flex; align-items: center; gap: 10px; }
        .sidebar-logo h1 i { color: var(--primary-orange); }
        .nav-menu { list-style: none; margin-top: 40px; flex-grow: 1; }
        .nav-link { display: flex; align-items: center; gap: 12px; color: #aaa; text-decoration: none; padding: 12px 15px; border-radius: 12px; margin-bottom: 5px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background-color: var(--primary-orange); color: white; }
        .main-content { margin-left: 260px; flex-grow: 1; padding: 40px; }
        .stat-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); border-bottom: 4px solid transparent; transition: 0.3s; }
        .stat-card:hover { border-bottom: 4px solid var(--primary-orange); transform: translateY(-5px); }
        .stat-card .value { font-size: 2.5rem; font-weight: 700; color: var(--primary-orange); }
        .btn-go { background-color: var(--secondary-orange); color: var(--primary-orange); border: none; padding: 8px 25px; border-radius: 15px; font-weight: 700; cursor: pointer; }
        .btn-go:hover { background-color: var(--primary-orange); color: white; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-logo">
            <h1>MACUIN <i class="bi bi-car-front-fill"></i></h1>
            <p style="font-size: 0.7rem; color: #888;">PERSONAL INTERNO</p>
        </div>
        <ul class="nav-menu">
            <li><a href="dashboard.html" class="nav-link active"><i class="bi bi-grid"></i> Dashboard</a></li>
            <li><a href="productos.html" class="nav-link"><i class="bi bi-tools"></i> Autopartes</a></li>
            <li><a href="gestion_inventario.html" class="nav-link"><i class="bi bi-box-seam"></i> Inventario</a></li>
            <li><a href="pedidos.html" class="nav-link"><i class="bi bi-cart"></i> Pedidos</a></li>
        </ul>
        <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid #333;">
            <a href="reportes_clientes.html" class="nav-link"><i class="bi bi-person"></i> Mi Perfil</a>
            <a href="index.html" class="nav-link" style="color: #ff4d4d;"><i class="bi bi-box-arrow-left"></i> Salir</a>
        </div>
    </nav>
    <main class="main-content">
        <h2 style="margin-bottom: 30px;">Panel de Control <span style="color: var(--primary-orange);">MACUIN</span></h2>
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px;">
            <div class="stat-card">
                <p style="color: #666;">Pendientes</p>
                <div class="value">12</div>
                <button class="btn-go" onclick="location.href='pedidos.html'">Ver</button>
            </div>
            <div class="stat-card">
                <p style="color: #666;">En Proceso</p>
                <div class="value">8</div>
                <button class="btn-go" onclick="location.href='pedidos.html'">Ver</button>
            </div>
            <div class="stat-card">
                <p style="color: #666;">Stock Bajo</p>
                <div class="value">6</div>
                <button class="btn-go" onclick="location.href='gestion_inventario.html'">Revisar</button>
            </div>
            <div class="stat-card">
                <p style="color: #666;">Completados</p>
                <div class="value">6</div>
                <button class="btn-go" onclick="location.href='reportes_pedidos.html'">Detalle</button>
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 25px;">
            <div style="background: white; padding: 30px; border-radius: 20px;">
                <h4 style="margin-bottom: 20px;">Rendimiento Mensual</h4>
                <canvas id="naranjaChart"></canvas>
            </div>
            <div style="background: white; padding: 30px; border-radius: 20px;">
                <h4 style="margin-bottom: 20px;">Top Autopartes</h4>
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div style="width: 40px; height: 40px; background: var(--secondary-orange); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--primary-orange);">
                            <i class="bi bi-gear-fill"></i>
                        </div>
                        <div>
                            <p style="font-weight: 600; font-size: 0.9rem;">Filtro de Aceite</p>
                            <small style="color: #ffbc00;"><i class="bi bi-star-fill"></i> 4.8</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        const ctx = document.getElementById('naranjaChart');
        new Chart(ctx, { type: 'bar', data: { labels: ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun'], datasets: [{ label: 'Pedidos', data: [15, 25, 18, 42, 30, 48], backgroundColor: '#ff7324', borderRadius: 8 }] }, options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } } });
    </script>
</body>
</html>
