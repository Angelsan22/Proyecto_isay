<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Pedido - MACUIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary-orange: #ff7324; --primary-dark: #1e1e1e; --bg-light: #f8f9fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--bg-light); padding: 20px; }
        .detail-card { background: #ffffff; width: 100%; max-width: 800px; padding: 40px 50px; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo h1 { font-size: 1.4rem; display: flex; align-items: center; gap: 10px; font-weight: 800; }
        .logo h1 i { color: var(--primary-orange); }
        .btn-regresar { text-decoration: none; color: var(--primary-dark); font-weight: 600; font-size: 0.85rem; border-bottom: 2px solid var(--primary-orange); }
        h2 { font-size: 2.2rem; margin-bottom: 40px; font-weight: 800; text-align: center; color: var(--primary-dark); }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 30px; }
        .column-title { font-size: 1rem; font-weight: 700; color: #6610f2; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: 600; color: #888; margin-bottom: 6px; }
        .field-box { width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid #eef0f2; background-color: #f9f9f9; color: #444; font-size: 0.9rem; font-weight: 600; }
        .status-select { width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid var(--primary-orange); background-color: #fff; color: var(--primary-orange); font-weight: 700; outline: none; cursor: pointer; }
        .btn-update { width: 100%; padding: 16px; margin-top: 10px; border-radius: 12px; border: none; background-color: var(--primary-dark); color: white; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-update:hover { background-color: #000; transform: translateY(-2px); }
        @media (max-width: 600px) { .info-grid { grid-template-columns: 1fr; gap: 20px; } }
    </style>
</head>
<body>
    <div class="detail-card">
        <header class="header">
            <div class="logo"><h1>MACUIN <i class="bi bi-car-front-fill"></i></h1></div>
            <a href="pedidos.html" class="btn-regresar">REGRESAR</a>
        </header>
        <h2>Detalle de Pedido</h2>
        <form action="pedidos.html">
            <div class="info-grid">
                <div class="info-column">
                    <h3 class="column-title">Información general</h3>
                    <div class="input-group"><label>Código artículo</label><div class="field-box">ART-8821</div></div>
                    <div class="input-group"><label>Código cliente</label><div class="field-box">CLI-0045</div></div>
                    <div class="input-group"><label>Estatus</label>
                        <select class="status-select">
                            <option>Pendiente</option>
                            <option selected>En Proceso</option>
                            <option>Enviado</option>
                            <option>Entregado</option>
                        </select>
                    </div>
                </div>
                <div class="info-column">
                    <h3 class="column-title">Detalle de productos</h3>
                    <div class="input-group"><label>Autoparte</label><div class="field-box">Amortiguador Hidráulico</div></div>
                    <div class="input-group"><label>Cantidad</label><div class="field-box">4 unidades</div></div>
                    <div class="input-group"><label>Total</label><div class="field-box" style="color: var(--primary-orange); font-weight: 700;">$5,000.00</div></div>
                </div>
            </div>
            <button type="submit" class="btn-update">Actualizar Estatus</button>
        </form>
    </div>
</body>
</html>
